<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Change Password — BMM Cut Test 2.0</title>
  <meta name="theme-color" content="#1c1a18"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .banner {
      background: #1c1a18;
      border-radius: 14px 14px 0 0;
      border-bottom: 3px solid #8b0000;
      padding: 22px 44px 18px;
      width: 400px;
      text-align: center;
    }
    .banner h1 {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #a09070;
      margin-top: 6px;
    }
    .banner .icon { font-size: 2rem; display: block; margin-bottom: 4px; }
    .card {
      background: white;
      border-radius: 0 0 14px 14px;
      padding: 28px 44px 36px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .card h2 { font-size: 1rem; color: #2c3e50; margin-bottom: 4px; }
    .card .sub { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
      margin-top: 14px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #8b0000; }
    .error-msg {
      background: #fdecea;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
    }
    .success-msg {
      background: #eafaf1;
      color: #1e8449;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
    }
    .btn-submit {
      width: 100%;
      padding: 11px;
      background: #8b0000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 22px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #6b0000; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.83rem;
      color: #8b0000;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <span class="icon">🥩</span>
      <h1>BMM Cut Test 2.0</h1>
    </div>
    <div class="card">
      <h2>Change Password</h2>
      <p class="sub">Logged in as: <strong>{{ username }}</strong></p>

      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="success-msg">{{ success }}</div>
      {% endif %}

      <form method="POST" action="/change-password">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password"
               autocomplete="current-password" required autofocus/>

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password"
               autocomplete="new-password" required/>

        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               autocomplete="new-password" required/>

        <button type="submit" class="btn-submit">Change Password</button>
      </form>
      <a href="/" class="back-link">← Back to App</a>
    </div>
  </div>
</body>
</html>
